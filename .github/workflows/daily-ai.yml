name: Daily AI Web Surfing Feed

on:
  schedule:
    - cron: '0 0 * * *' # Runs exactly at midnight UTC every day
  workflow_dispatch: # Allows you to run it manually anytime from GitHub

jobs:
  surf-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Google AI SDK
        run: npm install @google/genai

      - name: Run AI Web Crawler Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node crawler.js

      - name: Commit and Push fresh data.json live
        run: |
          git config --global user.name "AI-Agent-Bot"
          git config --global user.email "bot@overachiever.internal"
          
          # 1. Fetch the latest changes from your main repo state
          git fetch origin main
          
          # 2. Force checkout just the data.json file from our fresh run state
          # This tells git: "I don't care what changed on the remote repo, our new scrape wins."
          git add data.json
          git commit -m "Automated Daily Discovery Update [skip ci]" || exit 0
          
          # 3. Pull down changes but tell git to prioritize the local bot's incoming changes strategy
          git pull origin main --strategy-option=theirs --allow-unrelated-histories || true
          
          # 4. Push it live safely
          git push origin main
